# PUC Minas - Bakta Docker Compose
# Orquestração de containers para o ambiente Bakta

services:
  bakta-app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: pucminas/bakta:latest
    container_name: puc-bakta
    
    ports:
      - "5000:5000"
    
    volumes:
      # Volume para resultados persistentes
      - ../resultados:/app/resultados
      # Volume para uploads
      - ../data/uploads:/app/data/uploads
      # Volume para templates
      - ../data/templates:/app/data/templates
      # Volume para database (persistente)
      - bakta-db:/app/bakta-light
    
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - BAKTA_DB=/app/bakta-light
      - PYTHONPATH=/app
    
    # Configurações de recursos
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Reiniciar em caso de falha
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Serviço opcional: Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    container_name: puc-bakta-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bakta-app
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  bakta-db:
    driver: local

networks:
  default:
    name: bakta-network
